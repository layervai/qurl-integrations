name: Bug Report
description: Report a bug to help us improve. Do NOT use this for security vulnerabilities — see SECURITY.md.
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        > **Security vulnerabilities: stop.** Report privately via [GitHub Security Advisory](https://github.com/layervai/qurl-integrations/security/advisories/new) or email `security@layerv.ai`. Do NOT open a public issue. See `SECURITY.md`.
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: |
        - **critical** — production outage potential, data loss risk, live-customer breakage
        - **high** — significant user impact, blocker for other work, correctness bug in shipped feature
        - **medium** — standard bug, non-urgent
        - **low** — polish, minor fix, tech debt
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      # Keep this list aligned with the Commit Format scopes in CLAUDE.md,
      # EXCEPT for `other` — that's a reporter-UX escape hatch, not a
      # valid commit scope. Adding a new app? Update both places in
      # the same PR. Don't propagate `other` to CLAUDE.md.
      # Not enforced at CI here; convention only.
      description: Match one of the commit scopes in CLAUDE.md (or pick `other` for cross-cutting). Keeps downstream triage scriptable.
      options:
        - slack
        - teams
        - discord
        - cli
        - zapier
        - shared
        - other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Release tag or commit SHA
      description: The app-specific release tag (e.g. `slack/v0.1.0`, `cli/v0.2.0`) or a raw commit SHA. Leave blank if unknown — a triager can fill it in.
      placeholder: e.g. slack/v0.1.0 or commit abcd1234
    # Optional: reporters often lack deploy access to discover a SHA; triage fills it in.
  - type: input
    id: os
    attributes:
      label: OS
      description: Only needed for the CLI or a local reproduction.
      placeholder: e.g. macOS 15, Ubuntu 24.04
  - type: input
    id: go_version
    attributes:
      label: Go version
      description: Only needed if the bug is build- or runtime-related.
      placeholder: e.g. 1.26.x (paste from `go version`)
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        For Lambda-hosted apps (Slack, Teams, Discord, Zapier): CloudWatch group `/aws/lambda/<app-name>`. For the CLI: stderr from the failing command.
        Include correlation IDs and timestamps if available.
        **Redact before pasting:** bearer tokens, Slack/Discord bot tokens (`xoxb-…`, `Bot …`), API keys, and customer identifiers.
      # No `render:` — `render: shell` shell-highlights content, which
      # miscolors Go stack traces and JSON-structured log lines.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, related issues, prior discussion, anything else worth knowing.
