# Dependency Age Check (pip / Python)
# Thin shim calling shared reusable workflow.
# Source: https://github.com/layervai/ops-routines-workflows/blob/main/.github/workflows/age-check-pip.yml
name: Dependency Age Check (pip)

# Fires on every PR (no path filter) so the status check always reports.
# This lets branch protection require it without the path-filtered-
# required-check footgun. The reusable's script exits 0 quickly when
# no requirements/poetry.lock/pyproject.toml changes are in the diff.
on:
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same PR branch — pypi.org calls are
# rate-limited and we throttle ourselves; no reason to let two race.
concurrency:
  group: dep-age-pip-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  age-check:
    # No outer `if:` for `age-check-bypass`. The required status check
    # is `age-check / check-pip-age` (caller-job / reusable-inner-job).
    # Skipping here means the reusable never runs and the inner job
    # never reports → required check stuck at "Expected — Waiting"
    # forever. The reusable's inner `if:` handles bypass and reports
    # SKIPPED, which satisfies the required check.
    # Note: `timeout-minutes` is intentionally NOT set here. Per GH
    # docs (https://docs.github.com/en/actions/using-workflows/reusing-workflows#supported-keywords-for-jobs-that-call-a-reusable-workflow)
    # only if/name/needs/permissions/secrets/strategy/uses/with/concurrency
    # are valid on a job that calls a reusable workflow. The reusable
    # workflow itself sets `timeout-minutes: 5` internally.
    uses: layervai/ops-routines-workflows/.github/workflows/age-check-pip.yml@4edea7408d64f424780e08f68a54000308817a08 # v0.6.1
    with:
      min_age_days: 7
      # Post a sticky PR comment when an age-check fails, listing each
      # pin with its eligible-after date and days remaining. The PR
      # author / reviewer sees the retry-after date inline on the PR
      # instead of having to click into the run log to find it. Sticky
      # comment is updated in place on re-runs and deleted on a clean
      # pass; soft-fails to a `::notice` if the token can't write.
      comment_on_failure: true
      # Scoped to apps/discord — the only Python app in this Go
      # monorepo today. Add a second shim (different working_directory)
      # if more Python apps land.
      working_directory: apps/discord
    # See dependency-age-check-actions.yml for rationale on secrets: inherit.
    secrets: inherit
    permissions:
      contents: read
      # Required for `comment_on_failure: true` to actually post.
      # Dependabot PRs default to read-only and need this grant
      # explicitly. Without it, the workflow still fails the age check
      # correctly — only the inline comment is suppressed.
      pull-requests: write
