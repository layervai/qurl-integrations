name: Release Please

# Release flow for the monorepo:
#
#   1. release-please maintains per-component release PRs (see
#      release-please-config.json). Merging one creates the tag and the
#      GitHub Release.
#   2. CLI releases additionally run GoReleaser to attach binaries, publish
#      the Homebrew tap formula, and build deb/rpm packages.
#
# GoReleaser runs as a dependent job here — NOT as a tag-triggered workflow —
# because release-please tags with the workflow's GITHUB_TOKEN, and GitHub
# never fires `on: push: tags:` workflows for events created by that token.
#
# The CLI is the one component released WITHOUT a component prefix in its tag
# (`v0.2.0`, not `cli-v0.2.0`; `include-component-in-tag: false` in
# release-please-config.json). OSS GoReleaser derives {{ .Version }} from the
# current semver tag and cannot parse prefixed tags (monorepo tag_prefix is a
# GoReleaser Pro feature), and nothing else consumes bare v* tags in this
# repo. scripts/install.sh and Formula/qurl.rb rely on this contract.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      cli_release_created: ${{ steps.release.outputs['apps/cli--release_created'] }}
      cli_tag: ${{ steps.release.outputs['apps/cli--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-cli:
    needs: release-please
    if: needs.release-please.outputs.cli_release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.release-please.outputs.cli_tag }}
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # release.mode defaults to keep-existing: GoReleaser uploads artifacts
      # to the release release-please just created and keeps its notes.
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
