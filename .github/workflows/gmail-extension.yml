name: "gmail-extension: Build and Test"

on:
  push:
    branches: [main, developer]
    paths:
      - 'apps/gmail-extension/**'
      - '.github/workflows/gmail-extension.yml'
  pull_request:
    branches: [main, developer]
    paths:
      - 'apps/gmail-extension/**'
      - '.github/workflows/gmail-extension.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/gmail-extension
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/gmail-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          node --check popup/popup.js
          node --check background.js
          node --check content/gmail-compose.js
          node --check lib/qurl-api.js
          node --check lib/qurl-compose-format.js
          node --check lib/qurl-i18n.js

      - name: Run tests
        run: npm test

      - name: Build release
        run: npm run release

      - name: Package release
        run: npm run package:release
