# Dependency Age Check (Docker)
# Thin shim calling shared reusable workflow.
name: Dependency Age Check (Docker)

on:
  pull_request:
    # Cover anywhere a Docker image reference can land:
    # - Dockerfile / Dockerfile.<variant> at any depth (FROM lines)
    # - The docker/ directory (Dockerfiles + docker-compose.yaml)
    # - Any docker-compose/compose YAML anywhere in the tree — `image:`
    #   fields in compose files are a common base-image drift vector
    #   that the Dockerfile-only filter would miss.
    paths:
      - "**/Dockerfile*"
      - "docker/**"
      - "**/docker-compose*.yml"
      - "**/docker-compose*.yaml"
      - "**/compose*.yml"
      - "**/compose*.yaml"
  workflow_dispatch:

# Cancel superseded runs on the same PR branch.
concurrency:
  group: dep-age-docker-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  age-check:
    # Honor `age-check-bypass` at the shim level AS WELL AS inside the
    # reusable workflow. Defense-in-depth: if the reusable workflow
    # implementation ever drops the label check (or the reusable ref
    # is bumped to a version that doesn't respect it), the shim still
    # skips consistently.
    #
    # On `workflow_dispatch`, `github.event.pull_request` is null — the
    # labels array evaluates empty and `contains(...)` is false, so the
    # job always runs. That's the desired behavior: manual runs
    # shouldn't be bypassable via PR labels.
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'age-check-bypass') }}
    uses: layervai/ops-routines/.github/workflows/age-check-docker.yml@2b9cb3575a74394cf56092d33ee4fdbab30afc9e # v0.1.4
    permissions:
      contents: read
