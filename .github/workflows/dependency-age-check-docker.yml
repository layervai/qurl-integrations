# Dependency Age Check (Docker)
# Thin shim calling shared reusable workflow.
# Source: https://github.com/layervai/ops-routines-workflows/blob/main/.github/workflows/age-check-docker.yml
name: Dependency Age Check (Docker)

# Fires on every PR (no path filter) so the status check always reports.
# This lets branch protection require it without the path-filtered-
# required-check footgun. The reusable's script exits 0 quickly when
# no Dockerfile/compose changes are in the diff.
on:
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same PR branch — the reusable workflow
# makes sequential registry calls; no reason to let two race for an
# outdated diff.
concurrency:
  group: dep-age-docker-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  age-check:
    # No outer `if:` for `age-check-bypass`. The required status check
    # is `age-check / check-docker-age` (caller-job / reusable-inner-job).
    # Skipping here means the reusable never runs and the inner job
    # never reports → required check stuck at "Expected — Waiting"
    # forever. The reusable's inner `if:` handles bypass and reports
    # SKIPPED, which satisfies the required check.
    # Note: `timeout-minutes` is intentionally NOT set here. Per GH
    # docs (https://docs.github.com/en/actions/using-workflows/reusing-workflows#supported-keywords-for-jobs-that-call-a-reusable-workflow)
    # only if/name/needs/permissions/secrets/strategy/uses/with/concurrency
    # are valid on a job that calls a reusable workflow. The reusable
    # workflow itself sets `timeout-minutes: 5` internally.
    uses: layervai/ops-routines-workflows/.github/workflows/age-check-docker.yml@39fcb54fc36ea7b6032e138bd8b57647f2bb32f0 # v0.4.0
    with:
      # Container images get 14 days (vs 7 for source-package
      # ecosystems) — base-image vendors typically take longer to
      # surface and patch supply-chain compromise. Matches the
      # reusable's default; set explicitly here so the policy is
      # visible per-repo.
      min_age_days: 14
    # See dependency-age-check-actions.yml for rationale on secrets: inherit.
    secrets: inherit
    permissions:
      contents: read
