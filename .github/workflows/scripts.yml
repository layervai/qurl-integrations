# Lint and test the repo's shell scripts and release configuration.
# Cheap and unfiltered so the installer's tag-selection policy and the
# release-please config/manifest pairing can never drift without a PR check
# noticing (both previously merged with zero mechanical verification).
name: Scripts

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: scripts-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scripts:
    name: Lint and test scripts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # --severity=warning: SC2094 (info) false-positives on
      # validate-github-actions-pins.sh's fail() helper, which shellcheck
      # cannot tell does not write $file.
      - name: shellcheck
        run: shellcheck --severity=warning scripts/*.sh

      - name: Test install.sh
        run: scripts/test-install.sh

      - name: Check release-please config/manifest sync
        run: |
          python3 - <<'EOF'
          import json

          config = set(json.load(open("release-please-config.json"))["packages"])
          manifest = set(json.load(open(".release-please-manifest.json")))
          drift = sorted(config ^ manifest)
          if drift:
              raise SystemExit(f"release-please config/manifest key drift: {drift}")
          print("release-please config and manifest are in sync")
          EOF
