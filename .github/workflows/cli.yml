name: "cli: Build and Test"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    name: cli / detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: github.event_name == 'push'
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            cli:
              - 'apps/cli/**'
              - 'docs/cli/**'
              - 'shared/client/**'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - 'Makefile'
              - '.github/workflows/cli.yml'
              - '.goreleaser.yml'

  build:
    name: cli / build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build qurl
        run: |
          go build -trimpath -ldflags="-w -s -X main.version=${GITHUB_SHA}" -o /tmp/qurl ./apps/cli/cmd/
          /tmp/qurl version
          /tmp/qurl --help >/tmp/qurl-help.txt

  lint:
    name: cli / lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.10.1
          args: --timeout=5m ./apps/cli/...

  test:
    name: cli / test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run CLI tests
        run: go test -race -count=1 ./apps/cli/... ./shared/client/...

      - name: Vet
        run: go vet ./apps/cli/... ./shared/client/...

  docs:
    name: cli / docs
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify generated docs
        shell: bash
        run: |
          make docs
          docs_status="$(git status --porcelain -- docs/cli)"
          if [ -n "$docs_status" ]; then
            echo "$docs_status"
            git diff -- docs/cli
            exit 1
          fi

  vulnerability-scan:
    name: cli / govulncheck
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        run: go tool govulncheck ./apps/cli/... ./shared/client/...

  required:
    name: cli / required
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    needs: [changes, build, lint, test, docs, vulnerability-scan]
    if: always()
    steps:
      - name: Verify CLI CI result
        shell: bash
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          CLI_CHANGED: ${{ needs.changes.outputs.cli }}
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::cli / detect changes concluded $CHANGES_RESULT"
            exit 1
          fi

          case "$CLI_CHANGED" in
            true)
              ;;
            false)
              echo "No CLI-impacting changes detected; CLI CI is not required."
              exit 0
              ;;
            *)
              echo "::error::cli / detect changes emitted unexpected cli output: ${CLI_CHANGED:-<empty>}"
              exit 1
              ;;
          esac

          failed=0
          needs_rows="$(jq -r 'to_entries[] | [.key, (.value.result // "")] | @tsv' <<<"$NEEDS_JSON")"
          while IFS=$'\t' read -r job result; do
            [ -n "$job" ] || continue
            if [ "$job" = "changes" ]; then
              continue
            fi
            if [ "$result" != "success" ]; then
              echo "::error::cli / ${job} concluded ${result:-<empty>}"
              failed=1
            fi
          done <<<"$needs_rows"

          exit "$failed"
