name: Slack Integration

on:
  push:
    branches: [main]
    paths:
      - 'apps/slack/**'
      - 'shared/**'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    paths:
      - 'apps/slack/**'
      - 'shared/**'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with coverage
        run: |
          go test -race -count=1 -coverprofile=coverage.out -covermode=atomic \
            ./apps/slack/... ./shared/...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep ^total: | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 40" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below 40% threshold"
            exit 1
          fi

      - name: Vet
        run: go vet ./apps/slack/... ./shared/...

  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Lambda binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: go build -o bootstrap ./apps/slack/cmd/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: slack-lambda
          path: bootstrap
          retention-days: 7

  deploy-sandbox:
    name: Deploy (Sandbox)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: slack-sandbox
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: slack-lambda
          path: .

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INTEGRATIONS_SANDBOX_ROLE_ARN }}
          aws-region: us-east-2

      - name: Package Lambda
        run: zip slack-lambda.zip bootstrap

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
            --function-name integrations-slack-sandbox \
            --zip-file fileb://slack-lambda.zip \
            --publish

  deploy-production:
    name: Deploy (Production)
    runs-on: ubuntu-latest
    needs: deploy-sandbox
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: slack-production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: slack-lambda
          path: .

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INTEGRATIONS_PROD_ROLE_ARN }}
          aws-region: us-east-2

      - name: Package Lambda
        run: zip slack-lambda.zip bootstrap

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
            --function-name integrations-slack-prod \
            --zip-file fileb://slack-lambda.zip \
            --publish
