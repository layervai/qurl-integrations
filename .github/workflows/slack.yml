name: Slack Integration

on:
  push:
    branches: [main]
    paths:
      - 'apps/slack/**'
      - 'shared/**'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    paths:
      - 'apps/slack/**'
      - 'shared/**'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -race -count=1 ./apps/slack/... ./shared/...

      - name: Vet
        run: go vet ./apps/slack/... ./shared/...

  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Lambda binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: go build -o bootstrap ./apps/slack/cmd/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: slack-lambda
          path: bootstrap
          retention-days: 7

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # TODO: Add environment protection rule
    # environment: slack-sandbox
    steps:
      - run: echo "Deploy step placeholder — will be implemented with Terraform"
