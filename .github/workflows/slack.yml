name: Slack Integration

on:
  push:
    branches: [main]
    paths:
      - 'apps/slack/**'
      - 'shared/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/slack.yml'
  pull_request:
    paths:
      - 'apps/slack/**'
      - 'shared/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/slack.yml'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            app:
              - 'apps/slack/**'
              - 'shared/**'
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/slack.yml'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.10.1
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with coverage
        run: |
          go test -race -count=1 -coverprofile=coverage.out -covermode=atomic \
            ./apps/slack/... ./shared/...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep ^total: | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 40" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below 40% threshold"
            exit 1
          fi

      - name: Vet
        run: go vet ./apps/slack/... ./shared/...

  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  docker-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [changes, lint, test]
    if: needs.changes.outputs.app == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Cross-architecture build target: the ECS task runs on Graviton
      # (linux/arm64). Setting up qemu lets the ubuntu-latest amd64
      # runner emulate arm64 so the same Dockerfile that ships to
      # production is what CI verifies — not an amd64 facsimile.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build slack image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: apps/slack/Dockerfile
          platforms: linux/arm64
          push: false
          tags: qurl-bot-slack:ci

  trigger-deploy:
    name: Trigger ECS Deploy
    needs: [changes, lint, test, vulnerability-scan, docker-check]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      needs.changes.outputs.app == 'true' &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    steps:
      # SECURITY: DEPLOY_PAT must be a *fine-grained* personal access token
      # scoped to:
      #   - Repository: layervai/qurl-integrations-infra (ONLY)
      #   - Permissions: Contents = Read and write (repository_dispatch)
      # A classic PAT with broad 'repo' scope would let a compromised run of
      # this workflow trigger deploys or modify content on ANY repo the
      # token-owner has access to. Mirrors the discord.yml pattern.
      # Rotate on any suspected exposure.
      - name: Trigger deploy in infra repo
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.DEPLOY_PAT }}
          repository: layervai/qurl-integrations-infra
          event-type: slack-bot-deploy
          client-payload: '{"sha": "${{ github.sha }}", "ref": "refs/heads/main"}'
