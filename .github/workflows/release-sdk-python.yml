name: Release Python SDK

on:
  push:
    tags:
      - "sdk-python-v*"

permissions:
  contents: read
  id-token: write # PyPI trusted publishing

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: apps/sdk-python
        run: pip install -e ".[dev]"

      - name: Lint
        working-directory: apps/sdk-python
        run: ruff check src/ tests/

      - name: Type check
        working-directory: apps/sdk-python
        run: mypy src/

      - name: Test
        working-directory: apps/sdk-python
        run: pytest tests/ -v

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        working-directory: apps/sdk-python
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b54a8fdbd5870beac3d308d8 # v1.12.4
        with:
          packages-dir: apps/sdk-python/dist/
