name: E2E Smoke Tests (reusable)

on:
  workflow_call:
    inputs:
      trigger_source:
        description: "What triggered this (for summary)"
        required: false
        type: string
        default: "deploy"
    secrets:
      DISCORD_BOT_TOKEN:
        required: true
      DISCORD_CLIENT_ID:
        required: true
      QURL_API_TOKEN:
        required: true
      GH_PAT:
        required: true
      E2E_GUILD_ID:
        required: false
      E2E_CHANNEL_ID:
        required: false

permissions:
  contents: read

jobs:
  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout qurl-integrations (E2E tests)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          repository: layervai/qurl-integrations
          ref: main
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        working-directory: e2e
        run: npm ci

      - name: Run E2E smoke tests
        working-directory: e2e
        env:
          BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          BOT_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          QURL_API_KEY: ${{ secrets.QURL_API_TOKEN }}
          UPLOAD_API_URL: https://getqurllink.layerv.xyz/api
          MINT_API_URL: https://api.layerv.xyz/v1/qurls
          GUILD_ID: ${{ secrets.E2E_GUILD_ID || '1491271325791293611' }}
          CHANNEL_ID: ${{ secrets.E2E_CHANNEL_ID || '1491271326235885679' }}
        id: tests
        run: |
          npx jest --verbose --json --outputFile=results.json --testPathPattern='smoke|google-maps|discord-channels' || true
          # Set outcome based on Jest exit
          if jq -e '.success' results.json > /dev/null 2>&1; then
            echo "test_passed=true" >> $GITHUB_OUTPUT
          else
            echo "test_passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Post results summary
        if: always()
        working-directory: e2e
        run: |
          echo "## E2E Smoke Results (post ${{ inputs.trigger_source }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f results.json ]; then
            TOTAL=$(jq '.numTotalTests' results.json 2>/dev/null || echo "?")
            PASSED=$(jq '.numPassedTests' results.json 2>/dev/null || echo "?")
            FAILED=$(jq '.numFailedTests' results.json 2>/dev/null || echo "?")
            SUITES=$(jq '.numTotalTestSuites' results.json 2>/dev/null || echo "?")
            DURATION=$(jq '(.testResults | map(.perfStats.end - .perfStats.start) | add / 1000 | floor)' results.json 2>/dev/null || echo "?")
            if [ "${{ steps.tests.outputs.test_passed }}" = "true" ]; then
              echo "✅ **All $TOTAL tests passed** ($SUITES suites, ${DURATION}s)" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **$FAILED of $TOTAL tests failed** ($SUITES suites, ${DURATION}s)" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| Total | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No test results file found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
