name: E2E Discord Bot Tests

on:
  workflow_dispatch:
    inputs:
      group:
        description: 'Test group to run (e.g., a-happy-path, b-files, or "all")'
        required: false
        default: 'all'
      headless:
        description: 'Run headless'
        required: false
        default: 'true'
  schedule:
    # Run nightly at 3 AM UTC
    - cron: '0 3 * * *'

concurrency:
  group: e2e-discord-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pages: write
  checks: write

env:
  DISCORD_SENDER_EMAIL: ${{ secrets.E2E_DISCORD_SENDER_EMAIL }}
  DISCORD_SENDER_PASSWORD: ${{ secrets.E2E_DISCORD_SENDER_PASSWORD }}
  DISCORD_SENDER_TOTP_SECRET: ${{ secrets.E2E_DISCORD_SENDER_TOTP_SECRET }}
  DISCORD_RECIPIENT_EMAIL: ${{ secrets.E2E_DISCORD_RECIPIENT_EMAIL }}
  DISCORD_RECIPIENT_PASSWORD: ${{ secrets.E2E_DISCORD_RECIPIENT_PASSWORD }}
  DISCORD_RECIPIENT_TOTP_SECRET: ${{ secrets.E2E_DISCORD_RECIPIENT_TOTP_SECRET }}
  DISCORD_GUILD_ID: ${{ secrets.E2E_DISCORD_GUILD_ID }}
  DISCORD_CHANNEL_ID: ${{ secrets.E2E_DISCORD_CHANNEL_ID }}
  DISCORD_RECIPIENT_USERNAME: ${{ secrets.E2E_DISCORD_RECIPIENT_USERNAME }}
  CI: true
  HEADLESS: true

jobs:
  setup:
    name: Setup & Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate test files
        run: bash data/generate-test-files.sh

      - name: Run setup check
        run: npx ts-node scripts/setup.ts

      - name: Upload test files artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-files
          path: e2e/data/files/
          retention-days: 1

  test:
    name: E2E Tests (${{ matrix.group }})
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: e2e
    strategy:
      fail-fast: false
      matrix:
        group:
          - a-happy-path
          - b-files
          - c-locations
          - d-recipients
          - e-expiry
          - f-messages
          - g-negative
          - h-lifecycle
          - i-concurrency
          - j-ephemeral
          - k-autocomplete
          - l-management-window
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download test files
        uses: actions/download-artifact@v4
        with:
          name: test-files
          path: e2e/data/files/

      - name: Run test group ${{ matrix.group }}
        if: github.event.inputs.group == 'all' || github.event.inputs.group == matrix.group || github.event_name == 'schedule'
        run: npx playwright test tests/groups/${{ matrix.group }}
        env:
          GROUP: ${{ matrix.group }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.group }}
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 14

  report:
    name: Publish Results
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: all-results
          merge-multiple: true

      # --- JUnit report in GitHub Checks ---
      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: E2E Discord Bot Results
          path: all-results/**/junit.xml
          reporter: java-junit
          fail-on-error: false

      # --- CloudWatch Metrics ---
      - name: Configure AWS credentials
        if: always()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.E2E_AWS_ROLE_ARN }}
          aws-region: us-east-2
        continue-on-error: true

      - name: Install e2e deps
        if: always()
        run: cd e2e && npm ci

      - name: Publish CloudWatch metrics
        if: always()
        run: cd e2e && npx ts-node scripts/publish-metrics.ts ../all-results ${{ github.run_id }}
        continue-on-error: true

      # --- GitHub Pages (Playwright HTML report) ---
      - name: Merge Playwright HTML reports
        if: always()
        run: |
          mkdir -p gh-pages-report
          # Copy all HTML reports; last one wins for shared files, which is fine
          for dir in all-results/*/; do
            if [ -d "$dir" ]; then
              cp -r "$dir"* gh-pages-report/ 2>/dev/null || true
            fi
          done
          # Add an index with run metadata
          cat > gh-pages-report/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head><title>QURL E2E Test Results</title>
          <style>
            body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
            h1 { color: #1a1a1a; }
            .meta { color: #666; font-size: 14px; margin-bottom: 24px; }
            .groups { list-style: none; padding: 0; }
            .groups li { padding: 12px 16px; border: 1px solid #e1e4e8; border-radius: 6px; margin-bottom: 8px; }
            .groups a { color: #0366d6; text-decoration: none; font-weight: 500; }
            .groups a:hover { text-decoration: underline; }
          </style>
          </head>
          <body>
            <h1>QURL Discord Bot — E2E Test Results</h1>
            <div class="meta">
              Run: <strong>#${{ github.run_id }}</strong> |
              Branch: <code>${{ github.ref_name }}</code> |
              Commit: <code>${{ github.sha }}</code> |
              Date: $(date -u +"%Y-%m-%d %H:%M UTC")
            </div>
            <h2>Test Groups</h2>
            <ul class="groups">
              <li><a href="a-happy-path/">A — Happy Path Matrix</a></li>
              <li><a href="b-files/">B — File Dimension</a></li>
              <li><a href="c-locations/">C — Location Dimension</a></li>
              <li><a href="d-recipients/">D — Recipient Dimension</a></li>
              <li><a href="e-expiry/">E — Expiry</a></li>
              <li><a href="f-messages/">F — Message Sanitization</a></li>
              <li><a href="g-negative/">G — Negative Paths</a></li>
              <li><a href="h-lifecycle/">H — Link Lifecycle</a></li>
              <li><a href="i-concurrency/">I — Concurrency</a></li>
              <li><a href="j-ephemeral/">J — Ephemeral Visibility</a></li>
              <li><a href="k-autocomplete/">K — Autocomplete</a></li>
              <li><a href="l-management-window/">L — Management Window</a></li>
            </ul>
            <p><a href="https://github.com/layervai/qurl-integrations/actions/runs/${{ github.run_id }}">View full run on GitHub Actions</a></p>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages-report
          destination_dir: e2e
          keep_files: false
          commit_message: "e2e: update test report from run #${{ github.run_id }}"
