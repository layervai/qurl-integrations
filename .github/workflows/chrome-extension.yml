name: "chrome-extension: Build and Test"

on:
  push:
    branches: [main]
    paths:
      - 'apps/chrome-extension/**'
      - '.github/workflows/chrome-extension.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/chrome-extension/**'
      - '.github/workflows/chrome-extension.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Node version is read from apps/chrome-extension/.nvmrc below so CI and local dev (nvm)
# stay in lock-step. Avoid adding a NODE_VERSION env var or inline version — it would drift.

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/chrome-extension
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: apps/chrome-extension/.nvmrc
          cache: 'npm'
          cache-dependency-path: apps/chrome-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Syntax check
        run: |
          node --check popup/popup.js
          node --check background.js
          node --check content/gmail-compose.js
          node --check lib/qurl-api.js
          node --check lib/qurl-compose-format.js
          node --check lib/qurl-config.js
          node --check lib/qurl-i18n.js

      - name: Run tests
        run: npm test

      # package:release rebuilds the release/ directory from source (scripts/package-release.js
      # invokes build-release.js), so it exercises the build too — no separate build step needed.
      - name: Package release
        run: npm run package:release
