name: "discord: Build and Test"

on:
  push:
    branches: [main]
    paths:
      - 'apps/discord/**'
      - 'shared/**'
      - '.github/workflows/discord.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/discord/**'
      - 'shared/**'
      - '.github/workflows/discord.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Node version is read from apps/discord/.nvmrc below so CI, local dev
# (nvm), and the Dockerfile all stay in lock-step. Avoid adding a
# NODE_VERSION env var back — it would drift.

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/discord
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: apps/discord/.nvmrc
          cache: 'npm'
          cache-dependency-path: apps/discord/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        # --audit-level=high: this bot handles OAuth tokens, encrypted guild
        # keys, and webhook signatures — moderate-severity deps routinely
        # include upstream advisories that don't affect us, so we gate on
        # high+. Critical/high will still fail CI.
        # --omit=dev: exclude dev-only vulnerabilities from the production
        # audit gate so test-framework advisories don't block deploys.
        run: npm audit --audit-level=high --omit=dev

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --ci --silent

  docker-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify Dockerfile builds
        working-directory: apps/discord
        run: docker build -t discord-bot-test .

  # Pages on post-merge CI failures via Slack #all-layerv so a stale-
  # merge-ref bug (or any other class of regression that slipped past
  # PR-time CI) surfaces immediately, instead of staying silent behind
  # a `trigger-deploy: skipped` like #202 did.
  #
  # Routes through SLACK_WEBHOOK_URL repo secret — the team already
  # uses Slack for prod alerting and has no GitHub-issue alerting
  # attached, so an issue would have been silent. Webhook posts to
  # #all-layerv (the channel the secret is bound to).
  notify-on-main-failure:
    needs: [build-and-test, docker-check]
    if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Notify #all-layerv on Slack
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d # v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":rotating_light: discord CI failed on main \u2014 `${{ github.sha }}`",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*:rotating_light: discord CI regression on main*\n`build-and-test` and/or `docker-check` failed after merge. `trigger-deploy` is *skipped* \u2192 no new image in ECR; sandbox bot is on the prior image; `promote-bot-discord-to-prod.yml` will refuse at the sandbox-status-check gate. Open a hotfix PR against this SHA. See <https://github.com/${{ github.repository }}/pull/204|#204> for the pattern."
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Commit*\n`${{ github.sha }}`" },
                    { "type": "mrkdwn", "text": "*Run*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.run_id }}>" }
                  ]
                }
              ]
            }

  trigger-deploy:
    needs: [build-and-test, docker-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # The reusable authenticates via App secrets; the caller's GITHUB_TOKEN
    # isn't read by any step, so deny everything.
    permissions: {}
    uses: layervai/ops-routines-workflows/.github/workflows/dispatch-deploy.yml@ca41c7123c507ad45331a723851da6c010541154 # v0.6.2
    with:
      target_repo: qurl-integrations-infra
      # `event_type` must match the receiver's `repository_dispatch.types` at
      # qurl-integrations-infra/.github/workflows/qurl-bot-discord-deploy.yml.
      # An off-allowlist value hard-fails in the reusable; an allowlisted
      # value that misses the receiver silently no-ops (HTTP 204 from the
      # dispatch API but no workflow fires).
      event_type: discord-bot-deploy
      client_payload: '{"sha": "${{ github.sha }}", "ref": "refs/heads/main"}'
    # Explicit `secrets:` map (not `inherit`) keeps the reusable's surface
    # to the two named App secrets even as more secrets get added here.
    secrets:
      app_id: ${{ secrets.DEPLOY_DISPATCHER_APP_ID }}
      app_private_key: ${{ secrets.DEPLOY_DISPATCHER_APP_PRIVATE_KEY }}
