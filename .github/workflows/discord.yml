name: "discord: Build and Test"

on:
  push:
    branches: [main]
    paths:
      - 'apps/discord/**'
      - 'shared/**'
      - '.github/workflows/discord.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/discord/**'
      - 'shared/**'
      - '.github/workflows/discord.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: '22'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/discord
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/discord/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        # --audit-level=high: this bot handles OAuth tokens, encrypted guild
        # keys, and webhook signatures — moderate-severity deps routinely
        # include upstream advisories that don't affect us, so we gate on
        # high+. Critical/high will still fail CI.
        # --omit=dev: exclude dev-only vulnerabilities from the production
        # audit gate so test-framework advisories don't block deploys.
        run: npm audit --audit-level=high --omit=dev

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --ci --silent

  docker-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify Dockerfile builds
        working-directory: apps/discord
        run: docker build -t discord-bot-test .

  trigger-deploy:
    needs: [build-and-test, docker-check]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      # SECURITY: DEPLOY_PAT must be a *fine-grained* personal access token
      # scoped to:
      #   - Repository: layervai/qurl-integrations-infra (ONLY)
      #   - Permissions: Contents = Read and write (repository_dispatch)
      # A classic PAT with broad 'repo' scope would let a compromised run of
      # this workflow trigger deploys or modify content on ANY repo the
      # token-owner has access to. Rotate on any suspected exposure.
      - name: Trigger deploy in infra repo
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3
        with:
          token: ${{ secrets.DEPLOY_PAT }}
          repository: layervai/qurl-integrations-infra
          event-type: discord-bot-deploy
          client-payload: '{"sha": "${{ github.sha }}", "ref": "refs/heads/main"}'
