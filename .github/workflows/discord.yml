name: "discord: Build and Test"

on:
  push:
    branches: [main]
    paths:
      - 'apps/discord/**'
      - 'shared/**'
      - '.github/workflows/discord.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/discord/**'
      - 'shared/**'
      - '.github/workflows/discord.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: '22'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/discord
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/discord/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --silent

  docker-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify Dockerfile builds
        working-directory: apps/discord
        run: docker build -t discord-bot-test .

  trigger-deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger deploy in infra repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_PAT }}
          repository: layervai/qurl-integrations-infra
          event-type: discord-bot-deploy
          client-payload: '{"sha": "${{ github.sha }}", "ref": "refs/heads/main"}'
