name: "discord: Build and Test"

on:
  push:
    branches: [main]
    paths:
      - 'apps/discord/**'
      - 'shared/**'
      - '.github/workflows/discord.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/discord/**'
      - 'shared/**'
      - '.github/workflows/discord.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Node version is read from apps/discord/.nvmrc below so CI, local dev
# (nvm), and the Dockerfile all stay in lock-step. Avoid adding a
# NODE_VERSION env var back — it would drift.

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/discord
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: apps/discord/.nvmrc
          cache: 'npm'
          cache-dependency-path: apps/discord/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        # --audit-level=high: this bot handles OAuth tokens, encrypted guild
        # keys, and webhook signatures — moderate-severity deps routinely
        # include upstream advisories that don't affect us, so we gate on
        # high+. Critical/high will still fail CI.
        # --omit=dev: exclude dev-only vulnerabilities from the production
        # audit gate so test-framework advisories don't block deploys.
        run: npm audit --audit-level=high --omit=dev

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --ci --silent

  docker-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify Dockerfile builds
        working-directory: apps/discord
        run: docker build -t discord-bot-test .

  trigger-deploy:
    needs: [build-and-test, docker-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # SECURITY: dispatch goes through the dispatch-deploy reusable in
    # layervai/ops-routines-workflows (the public mirror). The reusable:
    #   - Mints a token from the qurl-deploy-dispatcher GitHub App
    #     (contents:write + metadata:read on qurl-integrations-infra
    #     ONLY). No personal-access-token in the loop.
    #   - Enforces target_repo + event_type allowlist; a compromised
    #     consumer cannot dispatch outside the approved set.
    #   - Scopes the minted token to a single receiver via `repositories:`.
    # Replaces the prior DEPLOY_PAT + peter-evans/repository-dispatch
    # pattern. SHA-pinned per the org's reusable-workflow convention;
    # bumps require an explicit PR. Closes #75.
    uses: layervai/ops-routines-workflows/.github/workflows/dispatch-deploy.yml@__OPS_ROUTINES_WORKFLOWS_SHA__
    with:
      target_repo: qurl-integrations-infra
      event_type: discord-bot-deploy
      client_payload: '{"sha": "${{ github.sha }}", "ref": "refs/heads/main"}'
    secrets:
      app_id: ${{ secrets.DEPLOY_DISPATCHER_APP_ID }}
      app_private_key: ${{ secrets.DEPLOY_DISPATCHER_APP_PRIVATE_KEY }}
