name: "discord: Build and Test"

on:
  push:
    branches: [main]
    paths:
      - 'apps/discord/**'
      - 'shared/**'
      - '.github/workflows/discord.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/discord/**'
      - 'shared/**'
      - '.github/workflows/discord.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Node version is read from apps/discord/.nvmrc below so CI, local dev
# (nvm), and the Dockerfile all stay in lock-step. Avoid adding a
# NODE_VERSION env var back — it would drift.

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/discord
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: apps/discord/.nvmrc
          cache: 'npm'
          cache-dependency-path: apps/discord/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        # --audit-level=high: this bot handles OAuth tokens, encrypted guild
        # keys, and webhook signatures — moderate-severity deps routinely
        # include upstream advisories that don't affect us, so we gate on
        # high+. Critical/high will still fail CI.
        # --omit=dev: exclude dev-only vulnerabilities from the production
        # audit gate so test-framework advisories don't block deploys.
        run: npm audit --audit-level=high --omit=dev

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --ci --silent

  docker-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify Dockerfile builds
        working-directory: apps/discord
        run: docker build -t discord-bot-test .

  # Pages on post-merge CI failures so a stale-merge-ref bug (or any
  # other class of regression that slipped past PR-time CI) surfaces
  # immediately as an actionable issue, instead of staying silent
  # behind a `trigger-deploy: skipped` like #202 did. The repo doesn't
  # have a Slack webhook secret wired up, so we file a GitHub issue
  # via the built-in token — same triaging surface, no secret deps.
  notify-on-main-failure:
    needs: [build-and-test, docker-check]
    if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: File regression-tracking issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v8.0.0
        with:
          script: |
            const sha = context.sha;
            const shortSha = sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `CI regression: discord build-and-test failed on main (${shortSha})`;
            const body = [
              `**Workflow run**: ${runUrl}`,
              `**Commit**: ${sha}`,
              ``,
              `\`build-and-test\` and/or \`docker-check\` failed on main after merge. Until this is fixed:`,
              `- \`trigger-deploy\` was skipped → no new image pushed to ECR.`,
              `- The discord bot in sandbox is running the prior image.`,
              `- \`promote-bot-discord-to-prod.yml\` will refuse at the sandbox-status-check gate.`,
              ``,
              `Open a hotfix PR against this SHA. See [#204](https://github.com/${context.repo.owner}/${context.repo.repo}/pull/204) for the pattern (the regression that motivated this guard).`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci-regression', 'discord'],
            });

  trigger-deploy:
    needs: [build-and-test, docker-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # The reusable authenticates via App secrets; the caller's GITHUB_TOKEN
    # isn't read by any step, so deny everything.
    permissions: {}
    uses: layervai/ops-routines-workflows/.github/workflows/dispatch-deploy.yml@86d4de84b95cf923bfdd11e3384a1f0deecfbef0 # v0.5.0
    with:
      target_repo: qurl-integrations-infra
      # `event_type` must match the receiver's `repository_dispatch.types` at
      # qurl-integrations-infra/.github/workflows/qurl-bot-discord-deploy.yml.
      # An off-allowlist value hard-fails in the reusable; an allowlisted
      # value that misses the receiver silently no-ops (HTTP 204 from the
      # dispatch API but no workflow fires).
      event_type: discord-bot-deploy
      client_payload: '{"sha": "${{ github.sha }}", "ref": "refs/heads/main"}'
    # Explicit `secrets:` map (not `inherit`) keeps the reusable's surface
    # to the two named App secrets even as more secrets get added here.
    secrets:
      app_id: ${{ secrets.DEPLOY_DISPATCHER_APP_ID }}
      app_private_key: ${{ secrets.DEPLOY_DISPATCHER_APP_PRIVATE_KEY }}
