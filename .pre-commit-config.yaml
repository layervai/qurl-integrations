# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: detect-private-key
      - id: check-merge-conflict

  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.88.30
    hooks:
      - id: trufflehog
        args: ['--only-verified']

  - repo: local
    hooks:
      - id: github-actions-pins
        name: GitHub Actions SHA pins
        entry: scripts/validate-github-actions-pins.sh
        language: system
        pass_filenames: false
        files: '^\.github/workflows/.*\.ya?ml$|^\.github/actions/(.*/)?action\.ya?ml$|^scripts/validate-github-actions-pins\.sh$'

      - id: github-actions-pin-tests
        name: GitHub Actions SHA pin tests
        entry: scripts/test-validate-github-actions-pins.sh
        language: system
        pass_filenames: false
        files: '^scripts/(validate|test-validate)-github-actions-pins\.sh$'

      - id: install-script-tests
        name: install.sh tests
        entry: scripts/test-install.sh
        language: system
        pass_filenames: false
        files: '^scripts/(install|test-install)\.sh$'

      - id: release-please-sync
        name: release-please config/manifest sync
        entry: scripts/check-release-please-sync.sh
        language: system
        pass_filenames: false
        files: '^(release-please-config\.json|\.release-please-manifest\.json|scripts/check-release-please-sync\.sh)$'

      - id: go-fmt
        name: go fmt
        entry: gofmt -w
        language: system
        types: [go]

      - id: go-mod-tidy
        name: go mod tidy
        entry: go mod tidy
        language: system
        pass_filenames: false
        files: '(\.go|go\.mod|go\.sum)$'

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.10.1
    hooks:
      - id: golangci-lint
        args: ['--timeout=5m']
