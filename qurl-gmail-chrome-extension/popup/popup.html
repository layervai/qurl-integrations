<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QURL File Upload</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="header-main">
        <div class="logo-icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 15V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V15" stroke="#4285F4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M17 8L12 3L7 8" stroke="#4285F4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 3V15" stroke="#4285F4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="header-text">
          <div class="title" data-i18n="ext_name">QURL File Upload</div>
          <div class="subtitle" data-i18n="subtitle">Upload files to QURL and insert links</div>
        </div>
      </div>
      <button
        id="settingsBtn"
        class="icon-btn settings-trigger"
        type="button"
        aria-label="Settings"
        aria-expanded="false"
        title="Settings"
        data-i18n-attr="aria-label,title"
        data-i18n-attr-key="settings_label"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <path d="M10.5 4H13.5L14.1 6.2C14.57 6.39 15.01 6.65 15.4 6.98L17.57 6.28L19.72 8.43L19.02 10.6C19.35 10.99 19.61 11.43 19.8 11.9L22 12.5V15.5L19.8 16.1C19.61 16.57 19.35 17.01 19.02 17.4L19.72 19.57L17.57 21.72L15.4 21.02C15.01 21.35 14.57 21.61 14.1 21.8L13.5 24H10.5L9.9 21.8C9.43 21.61 8.99 21.35 8.6 21.02L6.43 21.72L4.28 19.57L4.98 17.4C4.65 17.01 4.39 16.57 4.2 16.1L2 15.5V12.5L4.2 11.9C4.39 11.43 4.65 10.99 4.98 10.6L4.28 8.43L6.43 6.28L8.6 6.98C8.99 6.65 9.43 6.39 9.9 6.2L10.5 4Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="12" cy="14" r="3" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </button>
    </div>

    <div id="settingsPanel" class="settings-panel hidden">
      <div class="settings-panel-header">
        <div class="settings-panel-title" data-i18n="config_label">QURL server</div>
        <button
          id="settingsCloseBtn"
          class="icon-btn settings-close"
          type="button"
          aria-label="Close settings"
          title="Close settings"
          data-i18n-attr="aria-label,title"
          data-i18n-attr-key="settings_close_label"
        >
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 2L12 12M12 2L2 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <input
        id="apiBaseInput"
        class="config-input"
        type="url"
        placeholder="Enter QURL server URL"
        spellcheck="false"
        data-i18n-attr="placeholder"
        data-i18n-attr-key="config_placeholder"
      />
      <div class="config-actions">
        <button id="saveConfigBtn" class="btn btn-outline" data-i18n="save_config_btn">Save</button>
        <button id="resetConfigBtn" class="btn btn-outline" data-i18n="reset_config_btn">Use default</button>
      </div>
      <div id="permissionConfirmPanel" class="permission-confirm hidden">
        <div id="permissionConfirmText" class="permission-confirm-text"></div>
        <div class="permission-confirm-actions">
          <button id="permissionConfirmContinueBtn" class="btn btn-outline" data-i18n="permission_request_continue">Continue</button>
          <button id="permissionConfirmCancelBtn" class="btn btn-outline" data-i18n="permission_request_cancel">Cancel</button>
        </div>
      </div>
      <div id="configHint" class="config-hint" data-i18n="config_default_hint">Leave this blank to use the built-in default server.</div>
    </div>

    <!-- File Input Section -->
    <div class="section">
      <div class="section-label" data-i18n="select_label">Select files</div>
      <div class="file-input-wrapper">
        <input type="file" id="fileInput" multiple />
        <button id="selectBtn" class="btn btn-outline" data-i18n="browse_btn">Browse files</button>
        <span id="fileCount" class="file-count" data-i18n="no_file_selected">No file selected</span>
      </div>
      <div id="fileList" class="file-list"></div>
    </div>

    <!-- Upload Button -->
    <div class="section">
      <button id="uploadBtn" class="btn btn-primary btn-full" disabled data-i18n="upload_btn">Upload to QURL</button>
    </div>

    <!-- Progress / Results -->
    <div id="progressArea" class="section progress-area hidden"></div>
    <div id="resultArea" class="section result-area hidden"></div>
    <div id="errorArea" class="section error-area hidden"></div>
    <div id="copyArea" class="section copy-area hidden">
      <button id="copyBtn" class="btn btn-outline btn-full" disabled data-i18n="copy_btn">Copy inserted content</button>
    </div>

    <!-- Footer -->
    <div class="footer" data-i18n="footer_hint">Make sure a Gmail compose window is open.</div>

  </div>

  <script src="../lib/qurl-i18n.js"></script>
  <script src="../lib/qurl-compose-format.js"></script>
  <script src="../lib/qurl-api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
